services:
  - type: web
    name: duty-system
    env: python
    pythonVersion: 3.11
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        scope: run
      - key: DEBUG
        value: "False"
        scope: run
      - key: ALLOWED_HOSTS
        scope: run
      - key: DISCORD_WEBHOOK_URL
        scope: run
      - key: DATABASE_URL
        scope: run
      - key: TIME_ZONE
        value: "Asia/Dhaka"
        scope: run
      - key: BELL_TIME
        value: "15"
        scope: run
      - key: GRACE_PERIOD
        value: "10"
        scope: run
      - key: PYTHON_VERSION
        value: "3.11.0"
        scope: build
